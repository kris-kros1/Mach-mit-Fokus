<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Focus Clash</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#10131a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}button,input{font:inherit} .screen{display:none;width:100%;max-width:920px;min-height:100vh;padding:24px}.screen.active{display:flex;flex-direction:column;gap:18px;justify-content:center}.card{background:#1a1f2b;border:1px solid #30384a;border-radius:24px;padding:22px;box-shadow:0 10px 30px #0005}.title{font-size:52px;line-height:.9;font-weight:900;letter-spacing:.02em}.sub{color:#b8c0d4;font-size:18px}.row{display:flex;gap:12px;flex-wrap:wrap}.btn{border:0;border-radius:18px;padding:16px 20px;background:#4f7cff;color:#fff;font-weight:800;min-height:58px}.btn.secondary{background:#2a3142}.btn.good{background:#24a367}.btn.bad{background:#d64b4b}.input{width:100%;border:1px solid #44506a;background:#0f1320;color:#fff;border-radius:18px;padding:18px;font-size:30px;text-align:center;text-transform:uppercase}.code{font-size:54px;font-weight:900;letter-spacing:.12em;background:#0f1320;border-radius:22px;padding:16px;text-align:center}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.pill{background:#0f1320;border:1px solid #30384a;border-radius:999px;padding:10px 14px;color:#dce3f7}.game{display:grid;place-items:center;min-height:55vh}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:min(92vw,520px)}.cell{aspect-ratio:1;border-radius:18px;border:0;background:#2a3142;font-size:44px;color:white}.cell.flash{background:#ffd166;color:#111}.cell.target{outline:5px solid #fff}.bigshape{width:190px;height:190px;border-radius:40px;background:#4f7cff}.circle{border-radius:50%}.triangle{width:0;height:0;border-left:95px solid transparent;border-right:95px solid transparent;border-bottom:170px solid #4f7cff;background:transparent;border-radius:0}.feedback{font-size:32px;font-weight:900;text-align:center;min-height:42px}.small{font-size:14px;color:#9aa5bd}.scoreline{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #30384a;font-size:20px}.hidden{visibility:hidden}.center{text-align:center}.taparea{width:min(80vw,430px);height:min(80vw,430px);border-radius:26px;background:#141927;border:2px dashed #3a445c;position:relative}.dot{position:absolute;width:78px;height:78px;border-radius:50%;background:#24a367}.danger{background:#d64b4b}.emoji{font-size:90px}.muted{opacity:.55}@media(max-width:600px){.title{font-size:42px}.screen{padding:16px}.grid{gap:8px}.cell{font-size:34px}.code{font-size:42px}}
  </style>
</head>
<body>
  <section id="home" class="screen active">
    <div class="card center">
      <div class="title">FOCUS<br>CLASH</div>
      <p class="sub">Fokus • Reaktion • Wahrnehmung</p>
      <div class="row" style="justify-content:center">
        <button class="btn" onclick="hostGame()">SPIEL HOSTEN</button>
        <button class="btn secondary" onclick="show('join')">BEITRETEN</button>
      </div>
      <p class="small">GitHub Pages • WebRTC • kein Firebase</p>
    </div>
  </section>

  <section id="host" class="screen">
    <div class="top"><button class="btn secondary" onclick="location.reload()">←</button><span class="pill">HOST</span></div>
    <div class="card center"><div class="sub">CODE</div><div id="hostCode" class="code">----</div><p class="sub">Andere Tablets: gleiche URL öffnen und Code eingeben.</p></div>
    <div class="card"><h2>Spieler</h2><div id="players"></div></div>
    <button class="btn good" onclick="startRound()">START / WEITER</button>
    <div class="card"><h2>Rangliste</h2><div id="hostBoard"></div></div>
  </section>

  <section id="join" class="screen">
    <div class="top"><button class="btn secondary" onclick="show('home')">←</button><span class="pill">JOIN</span></div>
    <div class="card">
      <input id="nameInput" class="input" maxlength="12" placeholder="NAME" />
      <br><br>
      <input id="codeInput" class="input" maxlength="8" placeholder="CODE" />
      <br><br>
      <button class="btn" style="width:100%" onclick="joinGame()">VERBINDEN</button>
      <p id="joinStatus" class="sub center"></p>
    </div>
  </section>

  <section id="play" class="screen">
    <div class="top"><span class="pill" id="roundName">●</span><span class="pill">⏱ <b id="timer">10</b></span><span class="pill">⭐ <b id="score">0</b></span></div>
    <div class="card center"><div id="instruction" class="sub">Bereit</div><div id="game" class="game"></div><div id="feedback" class="feedback"></div></div>
  </section>

  <section id="board" class="screen">
    <div class="card"><h1>RANGLISTE</h1><div id="playerBoard"></div><button class="btn" style="width:100%;margin-top:16px" onclick="show('play')">WARTEN</button></div>
  </section>

<script>
const $=id=>document.getElementById(id); let peer, conns=[], hostConn=null, isHost=false, players={}, myName='', current=null, answered=false, timerInt=null, timeLeft=10;
const shapes=['●','■','▲','◆','★','✚']; const colors=['#4f7cff','#24a367','#ffd166','#d64b4b','#b66dff'];
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function code(){return Math.random().toString(36).slice(2,7).toUpperCase()}
function hostGame(){isHost=true; const id='fc-'+code().toLowerCase(); peer=new Peer(id,{debug:1}); peer.on('open',()=>{$('hostCode').textContent=id.replace('fc-','').toUpperCase();show('host')}); peer.on('connection',c=>{conns.push(c); c.on('data',d=>hostData(c,d)); c.on('open',()=>c.send({type:'hello'}));});}
function joinGame(){const c=$('codeInput').value.trim().toLowerCase(); myName=($('nameInput').value.trim()||'Spieler').slice(0,12); if(!c){$('joinStatus').textContent='Code eingeben';return} peer=new Peer(null,{debug:1}); peer.on('open',()=>{hostConn=peer.connect('fc-'+c); hostConn.on('open',()=>{hostConn.send({type:'join',name:myName});$('joinStatus').textContent='Verbunden';show('play')}); hostConn.on('data',playerData); hostConn.on('error',e=>$('joinStatus').textContent='Keine Verbindung');});}
function hostData(c,d){ if(d.type==='join'){players[c.peer]={name:d.name,score:0}; broadcast({type:'players',players}); renderHost()} if(d.type==='answer'&&players[c.peer]&&current){ if(d.ok) players[c.peer].score += Math.max(10, Math.round(timeLeft*10)); else players[c.peer].score -= 5; broadcast({type:'players',players}); renderHost(); }}
function broadcast(d){conns.forEach(c=>{try{c.send(d)}catch(e){}})}
function renderHost(){ $('players').innerHTML=Object.values(players).map(p=>'<div class="scoreline"><span>'+p.name+'</span><b>'+p.score+'</b></div>').join('')||'<p class="sub">Noch niemand verbunden.</p>'; $('hostBoard').innerHTML=boardHTML(players);}
function boardHTML(ps){return Object.values(ps).sort((a,b)=>b.score-a.score).map((p,i)=>'<div class="scoreline"><span>'+(i+1)+'. '+p.name+'</span><b>'+p.score+'</b></div>').join('')||'<p class="sub">Noch keine Punkte.</p>'}
function startRound(){ current=makeRound(); timeLeft=current.time||10; broadcast({type:'round',round:current}); runTimer(); }
function runTimer(){clearInterval(timerInt); timerInt=setInterval(()=>{timeLeft--; broadcast({type:'time',time:timeLeft}); if(timeLeft<=0){clearInterval(timerInt); broadcast({type:'board',players});}},1000)}
function makeRound(){const t=Math.floor(Math.random()*5); if(t===0)return {kind:'odd',name:'Unikat',time:12,target:Math.floor(Math.random()*16),base:shapes[Math.floor(Math.random()*shapes.length)],odd:shapes[Math.floor(Math.random()*shapes.length)]}; if(t===1)return {kind:'color',name:'Farbe',time:8,color:colors[Math.floor(Math.random()*colors.length)],choices:colors.slice().sort(()=>Math.random()-.5)}; if(t===2){let seq=[];while(seq.length<4){let n=Math.floor(Math.random()*16);if(!seq.includes(n))seq.push(n)} return {kind:'memory',name:'Merken',time:12,seq};} if(t===3)return {kind:'go',name:'Reaktion',time:8,go:Math.random()>.35,delay:1000+Math.random()*2500}; return {kind:'target',name:'Fokus',time:10,x:Math.random()*75+5,y:Math.random()*75+5,good:Math.random()>.25};}
function playerData(d){ if(d.type==='round'){answered=false; current=d.round; $('feedback').textContent=''; $('roundName').textContent=current.name; $('timer').textContent=current.time; renderRound(current)} if(d.type==='time')$('timer').textContent=d.time; if(d.type==='players'){let me=Object.values(d.players).find(p=>p.name===myName); if(me)$('score').textContent=me.score;} if(d.type==='board'){$('playerBoard').innerHTML=boardHTML(d.players);show('board')} }
function answer(ok){ if(answered)return; answered=true; $('feedback').textContent=ok?'✓':'×'; $('feedback').style.color=ok?'#24a367':'#d64b4b'; if(hostConn)hostConn.send({type:'answer',ok});}
function renderRound(r){show('play'); const g=$('game'); g.innerHTML=''; if(r.kind==='odd'){ $('instruction').textContent='Finde das andere Symbol'; const grid=document.createElement('div');grid.className='grid'; let odd=r.odd===r.base?'☀':r.odd; for(let i=0;i<16;i++){let b=document.createElement('button');b.className='cell';b.textContent=i===r.target?odd:r.base;b.onclick=()=>answer(i===r.target);grid.appendChild(b)} g.appendChild(grid);} if(r.kind==='color'){ $('instruction').textContent='Tippe die gleiche Farbe'; let box=document.createElement('div');box.className='bigshape circle';box.style.background=r.color; g.appendChild(box); let row=document.createElement('div');row.className='row';row.style.justifyContent='center';row.style.marginTop='18px'; r.choices.forEach(c=>{let b=document.createElement('button');b.className='cell';b.style.width='82px';b.style.background=c;b.onclick=()=>answer(c===r.color);row.appendChild(b)}); g.appendChild(row);} if(r.kind==='memory'){ $('instruction').textContent='Merke die hellen Felder'; const grid=document.createElement('div');grid.className='grid'; for(let i=0;i<16;i++){let b=document.createElement('button');b.className='cell';b.dataset.i=i;b.onclick=()=>answer(r.seq.includes(i));grid.appendChild(b)} g.appendChild(grid); setTimeout(()=>{[...grid.children].forEach((b,i)=>{if(r.seq.includes(i))b.classList.add('flash')})},200); setTimeout(()=>{[...grid.children].forEach(b=>b.classList.remove('flash'));$('instruction').textContent='Tippe ein gemerktes Feld'},2200);} if(r.kind==='go'){ $('instruction').textContent='Nur bei GRÜN tippen'; const area=document.createElement('button');area.className='taparea';area.onclick=()=>answer(r.go&&area.dataset.ready==='1'); g.appendChild(area); setTimeout(()=>{area.dataset.ready='1';area.innerHTML='<div class="emoji">'+(r.go?'●':'×')+'</div>';area.style.background=r.go?'#123d2a':'#3d1212';},r.delay);} if(r.kind==='target'){ $('instruction').textContent='Tippe den grünen Punkt'; let area=document.createElement('div');area.className='taparea';let dot=document.createElement('button');dot.className='dot'+(r.good?'':' danger');dot.style.left=r.x+'%';dot.style.top=r.y+'%';dot.onclick=e=>{e.stopPropagation();answer(r.good)}; area.onclick=()=>answer(false);area.appendChild(dot);g.appendChild(area);} }
</script>
</body>
</html>
