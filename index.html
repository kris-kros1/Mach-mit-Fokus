<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Focus Clash</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:#101014;color:white;display:flex;justify-content:center;align-items:center;text-align:center}.app{width:100%;max-width:760px;padding:24px}.screen{display:none}.screen.active{display:block}.panel{background:#181820;border-radius:28px;padding:34px 24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}.logo{font-size:54px;line-height:.92;font-weight:900;letter-spacing:2px;margin:0 0 14px}.tagline{font-size:20px;opacity:.85;margin:0 0 26px}.btn{display:block;width:100%;max-width:360px;margin:14px auto;padding:20px 22px;font-size:22px;font-weight:800;border:0;border-radius:22px;color:white;background:#2c2c38;cursor:pointer}.primary{background:#5b5cf0}.secondary{background:#2f303a}.footer{margin-top:26px;font-size:15px;opacity:.55}.back{position:absolute;top:18px;left:18px;font-size:28px;background:transparent;color:white;border:0}.code{font-size:64px;font-weight:900;letter-spacing:8px;margin:14px 0 20px}input{width:100%;max-width:330px;padding:18px;font-size:24px;text-align:center;border:0;border-radius:18px;margin:10px 0}.round{font-size:18px;opacity:.75;margin-bottom:16px}.taskText{font-size:24px;margin:8px 0 20px;font-weight:800}.big{font-size:72px;font-weight:900;margin:22px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:430px;margin:22px auto 0}.tile{height:130px;border:0;border-radius:26px;font-size:42px;font-weight:900;color:white;background:#333}.answerBtn{min-width:140px;padding:24px;font-size:28px;border:0;border-radius:22px;margin:12px;font-weight:900}.wait{font-size:30px;line-height:1.35;color:#9CFFA8;margin:28px 0}.smallText{opacity:.72;font-size:17px;line-height:1.4}.list{margin:18px auto;max-width:500px;text-align:left}.row{display:flex;justify-content:space-between;border-bottom:1px solid #2a2a36;padding:10px 0;font-size:18px;gap:12px}.err{color:#ff8585;margin-top:10px}.points{font-size:22px;font-weight:900;color:#9CFFA8}
</style></head><body><div class="app">
<section id="home" class="screen active"><div class="panel"><h1 class="logo">FOCUS<br>CLASH</h1><p class="tagline">Fokus • Reaktion • Wahrnehmung</p><button class="btn primary" onclick="goHost()">SPIEL HOSTEN</button><button class="btn secondary" onclick="goJoin()">BEITRETEN</button><div class="footer">GitHub Pages • WebRTC • kein Firebase</div></div></section>
<section id="hostSetup" class="screen"><button class="back" onclick="show('home')">←</button><div class="panel"><h2>HOST</h2><input id="hostName" placeholder="Dein Name" value="Host"><button class="btn primary" onclick="createRoom()">RAUM ERSTELLEN</button><div id="hostMsg" class="smallText"></div></div></section>
<section id="hostRoom" class="screen"><button class="back" onclick="location.reload()">←</button><div class="panel"><h2>HOST</h2><div id="roomCode" class="code">----</div><p class="smallText">Andere Tablets: gleiche URL öffnen, Namen eingeben und Code nutzen.</p><div id="playerList" class="list"></div><button class="btn primary" onclick="startGame()">START</button></div></section>
<section id="joinSetup" class="screen"><button class="back" onclick="show('home')">←</button><div class="panel"><h2>JOIN</h2><input id="playerName" placeholder="Dein Name"><input id="joinCode" placeholder="CODE" maxlength="4"><button class="btn primary" onclick="connectRoom()">VERBINDEN</button><div id="joinMsg" class="smallText"></div></div></section>
<section id="playerLobby" class="screen"><button class="back" onclick="location.reload()">←</button><div class="panel"><div class="wait">Verbunden<br>Warte auf Host…</div><div id="myName" class="smallText"></div></div></section>
<section id="hostControl" class="screen"><div class="panel"><div id="hostRound" class="round"></div><h2>RANGLISTE</h2><div id="answerCount" class="smallText"></div><div id="scoreboard" class="list"></div><button class="btn primary" onclick="hostNext()">WEITER</button></div></section>
<section id="game" class="screen"><div class="panel"><div id="round" class="round"></div><div id="task"></div><div id="answers"></div></div></section>
<section id="waitAnswer" class="screen"><div class="panel"><div class="wait">Antwort gespeichert<br>Warte auf Host…</div><div id="lastPoints" class="points"></div></div></section>
<section id="end" class="screen"><div class="panel"><h1 class="logo">FERTIG</h1><div id="finalScores" class="list"></div><button class="btn primary" onclick="location.reload()">NOCHMAL</button></div></section>
</div>
<script>
const TOTAL=20, MAX_TIME=3500;
let peer, conn, conns=[], roomCode="", players={}, scores={}, answered={}, round=0, myScore=0, locked=false, taskStart=0, rt=null, rat=null;
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function rnd(a){return a[Math.floor(Math.random()*a.length)]} function shuf(a){return a.sort(()=>Math.random()-.5)}
function nm(v,f){v=(v||'').trim();return v||f} function goHost(){show('hostSetup')} function goJoin(){show('joinSetup')}
function calcPoints(ms){return 100+Math.max(0,Math.round(100*(1-Math.min(ms,MAX_TIME)/MAX_TIME)))}
function createRoom(){roomCode=String(Math.floor(1000+Math.random()*9000));document.getElementById('hostMsg').innerText='Raum wird erstellt…';peer=new Peer('focus-clash-'+roomCode);peer.on('open',()=>{players={};scores={};document.getElementById('roomCode').innerText=roomCode;updatePlayerList();show('hostRoom')});peer.on('connection',c=>{c.on('data',m=>hostData(c,m))});peer.on('error',()=>document.getElementById('hostMsg').innerHTML='<div class=err>Fehler. Bitte neu laden.</div>')}
function hostData(c,m){if(!m||!m.type)return;if(m.type==='join'){players[c.peer]={name:nm(m.name,'Spieler')};scores[c.peer]=scores[c.peer]||0;if(!conns.includes(c))conns.push(c);c.send({type:'joined',name:players[c.peer].name,score:scores[c.peer]});updatePlayerList()}if(m.type==='answer'){if(answered[c.peer])return;let ms=Math.max(0,Number(m.elapsed)||0), earn=m.correct?calcPoints(ms):0;answered[c.peer]={correct:!!m.correct,elapsed:ms,earned:earn};scores[c.peer]=(scores[c.peer]||0)+earn;c.send({type:'points',earned:earn,total:scores[c.peer]});updateHostControl()}}
function updatePlayerList(){let ids=Object.keys(players), box=document.getElementById('playerList');box.innerHTML=ids.length?ids.map(id=>'<div class=row><span>'+players[id].name+'</span><span>bereit</span></div>').join(''):'<div class=row><span>Noch keine Spieler</span><span>0</span></div>'}
function connectRoom(){let code=(document.getElementById('joinCode').value||'').trim(), name=nm(document.getElementById('playerName').value,'Spieler');if(code.length<4){document.getElementById('joinMsg').innerHTML='<div class=err>Bitte Code eingeben.</div>';return}document.getElementById('joinMsg').innerText='Verbinde…';peer=new Peer();peer.on('open',()=>{conn=peer.connect('focus-clash-'+code,{reliable:true});conn.on('open',()=>conn.send({type:'join',name}));conn.on('data',playerData);conn.on('error',()=>document.getElementById('joinMsg').innerHTML='<div class=err>Verbindung fehlgeschlagen.</div>')});peer.on('error',()=>document.getElementById('joinMsg').innerHTML='<div class=err>PeerJS nicht erreichbar.</div>')}
function playerData(m){if(!m||!m.type)return;if(m.type==='joined'){myScore=m.score||0;document.getElementById('myName').innerText=m.name+' • '+myScore+' Punkte';show('playerLobby')}if(m.type==='task'){clearRT();locked=false;taskStart=Date.now();document.getElementById('lastPoints').innerText='';document.getElementById('round').innerText='Runde '+m.round+' / '+TOTAL+' • '+myScore+' Punkte';renderTask(m.task);show('game')}if(m.type==='points'){myScore=m.total||myScore;document.getElementById('lastPoints').innerText=(m.earned>0?('+'+m.earned):'0')+' Punkte • Gesamt: '+myScore}if(m.type==='end'){renderFinal(m.scores);show('end')}}
function broadcast(m){conns.forEach(c=>{try{c.send(m)}catch(e){}})}
function startGame(){round=0;Object.keys(scores).forEach(id=>scores[id]=0);hostNext()}
function hostNext(){if(round>=TOTAL){let arr=scoreArray();broadcast({type:'end',scores:arr});renderFinal(arr);show('end');return}round++;answered={};let task=makeTask();broadcast({type:'task',round,task});show('hostControl');updateHostControl()}
function updateHostControl(){let done=Object.keys(answered).length,total=conns.length;document.getElementById('hostRound').innerText='Runde '+round+' / '+TOTAL;document.getElementById('answerCount').innerText=done+' / '+total+' Antworten';document.getElementById('scoreboard').innerHTML=scoreArray().map((p,i)=>{let a=answered[p.id], ex=a?(' • '+(a.correct?'+'+a.earned:'0')+' • '+(a.elapsed/1000).toFixed(1)+'s'):'';return '<div class=row><span>'+(i+1)+'. '+p.name+ex+'</span><span>'+p.score+'</span></div>'}).join('')||'<div class=row><span>Noch keine Spieler</span><span>0</span></div>'}
function scoreArray(){return Object.keys(players).map(id=>({id,name:players[id].name,score:scores[id]||0})).sort((a,b)=>b.score-a.score)}
function renderFinal(arr){document.getElementById('finalScores').innerHTML=(arr&&arr.length?arr:scoreArray()).map((p,i)=>'<div class=row><span>'+(i+1)+'. '+p.name+'</span><span>'+p.score+'</span></div>').join('')||'<div class=row><span>Keine Spieler</span><span>0</span></div>'}
function answer(ok){if(locked)return;locked=true;clearRT();let elapsed=Date.now()-taskStart;if(conn)conn.send({type:'answer',correct:!!ok,elapsed});show('waitAnswer')}

function makeTask(){let t=rnd(['color','odd','memory','reaction','position']);return t==='color'?makeColor():t==='odd'?makeOdd():t==='memory'?makeMem():t==='reaction'?makeReact():makePos()}
function makeColor(){let words=['ROT','BLAU','GRÜN','GELB'],colors=['red','blue','green','yellow'],labels={red:'ROT',blue:'BLAU',green:'GRÜN',yellow:'GELB'};return{type:'color',mode:rnd(['ink','word','match','target']),word:rnd(words),color:rnd(colors),target:rnd(colors),labels}}
function makeOdd(){return{type:'odd',mode:rnd(['shade','shape','symbol','color']),odd:Math.floor(Math.random()*4)}}
function makeMem(){let mode=rnd(['number','symbol','color','position']);if(mode==='number')return{type:'memory',mode,value:String(Math.floor(1000+Math.random()*9000))};if(mode==='symbol')return{type:'memory',mode,value:rnd(['●','▲','■','◆'])};if(mode==='color')return{type:'memory',mode,value:rnd(['red','blue','green','yellow'])};return{type:'memory',mode,value:Math.floor(Math.random()*4)}}
function makeReact(){let mode=rnd(['green','notRed','blue','circle']),stim;if(mode==='green')stim=rnd(['lime','lime','red']);if(mode==='notRed')stim=rnd(['lime','blue','red']);if(mode==='blue')stim=rnd(['blue','blue','red']);if(mode==='circle')stim=rnd(['●','●','▲']);return{type:'reaction',mode,stim,delay:800+Math.floor(Math.random()*900)}}
function makePos(){return{type:'position',mode:rnd(['light','symbol','color']),pos:Math.floor(Math.random()*4)}}
function renderTask(t){if(t.type==='color')renderColor(t);if(t.type==='odd')renderOdd(t);if(t.type==='memory')renderMem(t);if(t.type==='reaction')renderReact(t);if(t.type==='position')renderPos(t)}
function renderColor(t){let task=document.getElementById('task'),area=document.getElementById('answers'),colors=['red','blue','green','yellow'];area.innerHTML='';area.className='grid';if(t.mode==='ink')task.innerHTML='<div class=taskText>SCHRIFTFARBE</div><div class=big style=color:'+t.color+'>'+t.word+'</div>';if(t.mode==='word')task.innerHTML='<div class=taskText>WORT</div><div class=big style=color:'+t.color+'>'+t.word+'</div>';if(t.mode==='target')task.innerHTML='<div class=taskText>NUR '+t.labels[t.target]+'</div>';if(t.mode==='match'){area.className='';task.innerHTML='<div class=taskText>PASST ES?</div><div class=big style=color:'+t.color+'>'+t.word+'</div>';let ok=(t.word==='ROT'&&t.color==='red')||(t.word==='BLAU'&&t.color==='blue')||(t.word==='GRÜN'&&t.color==='green')||(t.word==='GELB'&&t.color==='yellow');['JA','NEIN'].forEach(v=>{let b=document.createElement('button');b.className='answerBtn';b.innerText=v;b.onclick=()=>answer((v==='JA')===ok);area.appendChild(b)});return}colors.forEach(c=>{let b=document.createElement('button');b.className='tile';b.style.background=c;b.onclick=()=>{if(t.mode==='ink')answer(c===t.color);if(t.mode==='word'){let w=t.word==='ROT'?'red':t.word==='BLAU'?'blue':t.word==='GRÜN'?'green':'yellow';answer(c===w)}if(t.mode==='target')answer(c===t.target)};area.appendChild(b)})}
function renderOdd(t){let task=document.getElementById('task'),area=document.getElementById('answers');area.className='grid';area.innerHTML='';task.innerHTML='<div class=taskText>'+(t.mode==='shade'?'ANDERES FELD':t.mode==='shape'?'ANDERE FORM':t.mode==='symbol'?'ANDERES SYMBOL':'ANDERE FARBE')+'</div>';for(let i=0;i<4;i++){let b=document.createElement('button');b.className='tile';if(t.mode==='shade')b.style.background=i===t.odd?'#777':'#444';if(t.mode==='shape'){b.style.background='#444';b.style.borderRadius=i===t.odd?'45px':'16px'}if(t.mode==='symbol'){b.style.background='#444';b.innerText=i===t.odd?'◆':'●'}if(t.mode==='color')b.style.background=i===t.odd?'#5566cc':'#555577';b.onclick=()=>answer(i===t.odd);area.appendChild(b)}}
function renderMem(t){let task=document.getElementById('task'),area=document.getElementById('answers');area.className='';area.innerHTML='';task.innerHTML='<div class=taskText>MERKEN</div>';if(t.mode==='number'){area.innerHTML='<div class=big>'+t.value+'</div>';setTimeout(()=>memOpts(t.value,[t.value,randNum(),randNum(),randNum()],'WELCHE ZAHL?'),1000)}if(t.mode==='symbol'){area.innerHTML='<div class=big>'+t.value+'</div>';setTimeout(()=>memOpts(t.value,['●','▲','■','◆'],'WELCHES SYMBOL?'),1000)}if(t.mode==='color'){area.innerHTML='<div style=width:180px;height:180px;border-radius:28px;background:'+t.value+';margin:auto></div>';setTimeout(()=>{task.innerHTML='<div class=taskText>WELCHE FARBE?</div>';area.className='grid';area.innerHTML='';['red','blue','green','yellow'].forEach(c=>{let b=document.createElement('button');b.className='tile';b.style.background=c;b.onclick=()=>answer(c===t.value);area.appendChild(b)})},1000)}if(t.mode==='position'){area.className='grid';for(let i=0;i<4;i++){let b=document.createElement('button');b.className='tile';b.style.background=i===t.value?'white':'#333';area.appendChild(b)}setTimeout(()=>posChoice(t.value),850)}}
function randNum(){return String(Math.floor(1000+Math.random()*9000))}
function memOpts(correct,opts,title){let task=document.getElementById('task'),area=document.getElementById('answers'),o=[...new Set(opts)];while(o.length<4){let n=randNum();if(!o.includes(n))o.push(n)}shuf(o);task.innerHTML='<div class=taskText>'+title+'</div>';area.className='';area.innerHTML='';o.forEach(x=>{let b=document.createElement('button');b.className='answerBtn';b.innerText=x;b.onclick=()=>answer(x===correct);area.appendChild(b)})}
function renderReact(t){clearRT();let task=document.getElementById('task'),area=document.getElementById('answers');area.className='';area.innerHTML='<button id=reactBox class=tile style=width:100%;max-width:430px;background:#555></button>';if(t.mode==='green')task.innerHTML='<div class=taskText>TIPPE BEI GRÜN</div>';if(t.mode==='notRed')task.innerHTML='<div class=taskText>NICHT BEI ROT</div>';if(t.mode==='blue')task.innerHTML='<div class=taskText>TIPPE BEI BLAU</div>';if(t.mode==='circle')task.innerHTML='<div class=taskText>TIPPE BEI ●</div>';let box=document.getElementById('reactBox');rt=setTimeout(()=>{let ok=false;if(t.mode==='green'){box.style.background=t.stim;ok=t.stim==='lime'}if(t.mode==='notRed'){box.style.background=t.stim;ok=t.stim!=='red'}if(t.mode==='blue'){box.style.background=t.stim;ok=t.stim==='blue'}if(t.mode==='circle'){box.innerText=t.stim;ok=t.stim==='●'}box.onclick=()=>answer(ok);rat=setTimeout(()=>{if(locked)return;if(t.mode==='notRed'&&t.stim==='red')answer(true);else answer(false)},1300)},t.delay)}
function clearRT(){if(rt)clearTimeout(rt);if(rat)clearTimeout(rat);rt=null;rat=null}
function renderPos(t){let task=document.getElementById('task'),area=document.getElementById('answers');area.className='grid';area.innerHTML='';task.innerHTML='<div class=taskText>'+(t.mode==='light'?'HELLE POSITION':t.mode==='symbol'?'SYMBOL POSITION':'FARBE POSITION')+'</div>';for(let i=0;i<4;i++){let b=document.createElement('button');b.className='tile';b.style.background='#333';if(i===t.pos){if(t.mode==='light')b.style.background='white';if(t.mode==='symbol')b.innerText='◆';if(t.mode==='color')b.style.background='yellow'}area.appendChild(b)}setTimeout(()=>posChoice(t.pos),850)}
function posChoice(pos){let task=document.getElementById('task'),area=document.getElementById('answers');task.innerHTML='<div class=taskText>WO WAR ES?</div>';area.className='grid';area.innerHTML='';for(let i=0;i<4;i++){let b=document.createElement('button');b.className='tile';b.style.background='#444';b.onclick=()=>answer(i===pos);area.appendChild(b)}}
</script></body></html>
