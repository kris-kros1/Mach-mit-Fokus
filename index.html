<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Focus Clash</title>
<style>
:root{--bg:#10131a;--panel:#191e29;--text:#f5f7fb;--muted:#9ea8bb;--accent:#22c55e;--bad:#ef4444;--line:#2b3345;--btn:#2563eb;--yellow:#facc15;--blue:#38bdf8;--violet:#a78bfa}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.app{width:100%;max-width:820px}.screen{display:none}.screen.active{display:block}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,.25)}h1{font-size:48px;margin:0 0 6px;letter-spacing:1px}h2{margin:0 0 12px;font-size:30px}.sub{color:var(--muted);font-size:18px;margin-bottom:22px}.row{display:flex;gap:12px;flex-wrap:wrap}.btn{border:0;border-radius:16px;background:var(--btn);color:#fff;font-weight:800;font-size:20px;padding:17px 20px;min-height:62px;cursor:pointer;flex:1}.btn.secondary{background:#374151}.btn.good{background:#16a34a}.btn.bad{background:#dc2626}.btn:active{transform:scale(.985)}input{width:100%;font-size:26px;padding:17px;border-radius:16px;border:1px solid var(--line);background:#0c1018;color:var(--text);text-align:center;text-transform:uppercase;margin:12px 0}.code{font-size:54px;font-weight:900;letter-spacing:8px;text-align:center;background:#0c1018;border:1px solid var(--line);border-radius:20px;padding:18px;margin:15px 0}.status{color:var(--muted);font-size:16px;margin-top:12px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.pill{background:#0c1018;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--muted);font-weight:800;min-width:70px;text-align:center}.gamebox{height:430px;background:#0c1018;border:1px solid var(--line);border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;touch-action:manipulation;padding:18px}.grid{display:grid;grid-template-columns:repeat(4,76px);gap:14px}.tile{width:76px;height:76px;border-radius:17px;border:3px solid #334155;background:#1f2937;color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900}.tile.target{background:#22c55e;border-color:#bbf7d0}.tile.blue{background:#2563eb}.tile.red{background:#dc2626}.tile.yellow{background:#ca8a04}.tile.violet{background:#7c3aed}.big{font-size:96px;font-weight:900}.center{text-align:center}.rank{list-style:none;padding:0;margin:15px 0}.rank li{display:flex;justify-content:space-between;background:#0c1018;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:8px 0;font-size:20px}.small{font-size:14px;color:var(--muted)}.waitIcon{font-size:84px;margin:18px 0}.ok{color:#4ade80}.no{color:#fb7185}.mini{font-size:22px;color:var(--muted);line-height:1.45}.pattern{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap}.symbolBtn{font-size:58px;min-width:110px}.fix{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:58px;color:#f8fafc}.corner{position:absolute;font-size:68px;font-weight:900}.fade{opacity:.35}@media(max-width:560px){h1{font-size:38px}.gamebox{height:360px}.grid{grid-template-columns:repeat(4,60px);gap:10px}.tile{width:60px;height:60px;font-size:30px}.btn{font-size:18px}.code{font-size:42px}.big{font-size:74px}.symbolBtn{font-size:44px;min-width:86px}}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active"><div class="card center"><h1>FOCUS<br>CLASH</h1><div class="sub">Fokus • Reaktion • Wahrnehmung</div><div class="row"><button class="btn good" id="hostBtn">SPIEL HOSTEN</button><button class="btn" id="joinBtn">BEITRETEN</button></div><p class="small">GitHub Pages • WebRTC • kein Firebase</p></div></section>
<section id="host" class="screen"><div class="card"><button class="btn secondary" id="back1">←</button><h2>HOST</h2><div class="code" id="hostCode">----</div><button class="btn good" id="startBtn">START</button><p class="status" id="hostStatus">Andere Tablets: gleiche URL öffnen und Code eingeben.</p><ol class="rank" id="hostPlayers"></ol></div></section>
<section id="join" class="screen"><div class="card"><button class="btn secondary" id="back2">←</button><h2>JOIN</h2><input id="nameInput" placeholder="Name" maxlength="12"><input id="codeInput" placeholder="Code" maxlength="6"><button class="btn good" id="connectBtn">VERBINDEN</button><p class="status" id="joinStatus"></p></div></section>
<section id="game" class="screen"><div class="card"><div class="top"><div class="pill" id="roundName">●</div><div class="pill" id="timer">10</div><div class="pill" id="score">0</div></div><div class="gamebox" id="gamebox"></div></div></section>
<section id="wait" class="screen"><div class="card center"><div id="waitIcon" class="waitIcon ok">✓</div><h2 id="waitTitle">Antwort gespeichert</h2><div class="mini">Warte auf den Host.</div><div class="pill" style="margin:18px auto;width:max-content" id="waitScore">0</div></div></section>
<section id="board" class="screen"><div class="card"><h2>RANGLISTE</h2><ol class="rank" id="rankList"></ol><button class="btn good" id="nextBtn">WEITER</button><p class="small" id="boardHint"></p></div></section>
</div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function(){
const $=id=>document.getElementById(id); const screens=['home','host','join','game','wait','board'];
function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id));}
function code(){return Math.random().toString(36).slice(2,6).toUpperCase();}
let isHost=false, peer=null, conns=[], hostConn=null, room='', me='Spieler', score=0, round=0, timer=null, left=10, answered=false, roundOpen=false;
let players={host:{name:'Host',score:0}};
const games=[
 {name:'Unikat',type:'odd'}, {name:'Farb-Fokus',type:'colorFocus'}, {name:'Merkfeld',type:'memory'}, {name:'Reaktion',type:'reaction'}, {name:'Peripherie',type:'periphery'}, {name:'Muster',type:'pattern'}
];
function status(id,msg){$(id).textContent=msg;} function broadcast(m){conns.forEach(c=>{try{c.send(m)}catch(e){}})} function sendHost(m){if(hostConn)try{hostConn.send(m)}catch(e){}}
function updatePlayers(){ $('hostPlayers').innerHTML=Object.entries(players).map(([id,p])=>`<li><span>${p.name}</span><b>${p.score||0}</b></li>`).join(''); }
function renderBoard(data){ const arr=Object.values(data||players).sort((a,b)=>(b.score||0)-(a.score||0)); $('rankList').innerHTML=arr.map((p,i)=>`<li><span>${i+1}. ${p.name}</span><b>${p.score||0}</b></li>`).join(''); $('nextBtn').style.display=isHost?'block':'none'; $('boardHint').textContent=isHost?'Host drückt WEITER.':'Warte auf den Host.'; show('board'); }
function startPeerHost(){isHost=true;room=code();$('hostCode').textContent=room;show('host');peer=new Peer('focus-'+room,{debug:0});peer.on('open',()=>status('hostStatus','Bereit. Code eingeben lassen.'));peer.on('connection',conn=>{conns.push(conn);players[conn.peer]={name:'Spieler',score:0};updatePlayers();conn.on('data',m=>hostData(conn,m));conn.on('close',()=>{delete players[conn.peer];conns=conns.filter(c=>c!==conn);updatePlayers();});});peer.on('error',e=>status('hostStatus','Verbindung: '+e.type));updatePlayers();}
function connectToHost(){me=($('nameInput').value||'Spieler').trim().slice(0,12);room=($('codeInput').value||'').trim().toUpperCase();if(!room){status('joinStatus','Code eingeben.');return}peer=new Peer(null,{debug:0});status('joinStatus','Verbinde...');peer.on('open',()=>{hostConn=peer.connect('focus-'+room,{reliable:true});hostConn.on('open',()=>{status('joinStatus','Verbunden. Warte auf Start.');sendHost({kind:'join',name:me});showWait('●','Bereit','Warte auf den Host.',false);});hostConn.on('data',playerData);hostConn.on('close',()=>status('joinStatus','Verbindung getrennt.'));});peer.on('error',e=>status('joinStatus','Fehler: '+e.type));}
function hostData(conn,m){if(!m||!m.kind)return;const id=conn.peer;if(m.kind==='join'){players[id]={name:m.name||'Spieler',score:0};updatePlayers();conn.send({kind:'players',players});}if(m.kind==='answer'&&roundOpen){const p=players[id]; if(p&&!p.answered){p.answered=true;p.score=(p.score||0)+(m.points||0);updatePlayers();broadcast({kind:'players',players});}}}
function playerData(m){if(!m||!m.kind)return;if(m.kind==='start'){score=m.score??score;runRound(m.round,m.seed);}if(m.kind==='board'){renderBoard(m.players);}if(m.kind==='players'){} }
function hostStartRound(){ const seed=Math.floor(Math.random()*999999); roundOpen=true; Object.values(players).forEach(p=>p.answered=false); broadcast({kind:'start',round,seed}); runRound(round,seed); }
function showWait(icon,title,text,good=true){$('waitIcon').textContent=icon;$('waitIcon').className='waitIcon '+(good?'ok':'no');$('waitTitle').textContent=title;document.querySelector('#wait .mini').textContent=text;$('waitScore').textContent='Punkte: '+score;show('wait');}
function finishPlayerRound(){clearInterval(timer);roundOpen=false;showWait('✓','Antwort gespeichert','Warte auf den Host.',true);}
function endRound(){clearInterval(timer);roundOpen=false;if(isHost){players.host.score=score;broadcast({kind:'board',players});renderBoard(players);}else{finishPlayerRound();}}
function startClock(){left=10;$('timer').textContent=left;clearInterval(timer);timer=setInterval(()=>{left--;$('timer').textContent=left;if(left<=0)endRound();},1000);}
function points(){return Math.max(10,100+left*10);} function answer(ok){if(answered)return;answered=true;const pts=ok?points():-20;score+=pts;$('score').textContent=score;if(!isHost)sendHost({kind:'answer',points:pts});if(isHost){setTimeout(endRound,250)}else{clearInterval(timer);showWait(ok?'✓':'×',ok?'Gut!':'Nicht ganz','Warte auf den Host.',ok);}}
function rng(seed){let x=seed||1;return()=>{x=(x*9301+49297)%233280;return x/233280;}}
function runRound(i,seed){answered=false;roundOpen=true;const g=games[i%games.length];$('roundName').textContent=g.name;$('score').textContent=score;show('game');startClock();renderGame(g.type,seed);}
function makeBtn(cls,txt,fn){const b=document.createElement('button');b.className=cls;b.textContent=txt;b.onclick=fn;return b;}
function renderGame(type,seed){const box=$('gamebox');box.innerHTML='';box.onclick=null;const r=rng(seed);
 if(type==='odd'){const shapes=['●','■','▲','◆'];const a=shapes[Math.floor(r()*shapes.length)],b=shapes[(shapes.indexOf(a)+1+Math.floor(r()*3))%4];const target=Math.floor(r()*16);const grid=document.createElement('div');grid.className='grid';for(let i=0;i<16;i++)grid.appendChild(makeBtn('tile',i===target?b:a,()=>answer(i===target)));box.appendChild(grid);}
 if(type==='colorFocus'){const colors=['target','blue','red','yellow','violet'];const want=colors[Math.floor(r()*colors.length)];const target=Math.floor(r()*16);const grid=document.createElement('div');grid.className='grid';for(let i=0;i<16;i++){let c=i===target?want:colors[Math.floor(r()*colors.length)]; if(i!==target&&c===want)c=''; const t=makeBtn('tile '+c,'',()=>answer(i===target));grid.appendChild(t)}box.appendChild(grid);}
 if(type==='memory'){const target=Math.floor(r()*16);const grid=document.createElement('div');grid.className='grid';for(let i=0;i<16;i++){const t=document.createElement('button');t.className='tile '+(i===target?'target':'');t.textContent=i===target?'★':'';grid.appendChild(t)}box.appendChild(grid);setTimeout(()=>{[...grid.children].forEach((t,i)=>{t.className='tile';t.textContent='';t.onclick=()=>answer(i===target);});},1300);}
 if(type==='reaction'){const txt=document.createElement('div');txt.className='big fade';txt.textContent='●';box.appendChild(txt);box.onclick=()=>answer(false);setTimeout(()=>{if(answered)return;txt.className='big ok';box.onclick=()=>answer(true);},900+Math.floor(r()*1800));}
 if(type==='periphery'){const plus=document.createElement('div');plus.className='fix';plus.textContent='+';box.appendChild(plus);const positions=[[20,20],[75,20],[20,75],[75,75]];const target=Math.floor(r()*4);positions.forEach((p,i)=>{const d=document.createElement('button');d.className='corner btn secondary';d.style.left=p[0]+'%';d.style.top=p[1]+'%';d.style.transform='translate(-50%,-50%)';d.textContent=i===target?'●':'○';d.onclick=()=>answer(i===target);box.appendChild(d);});}
 if(type==='pattern'){const seq=['●','■','●','■'];const correct='●';const wrap=document.createElement('div');wrap.className='center';const p=document.createElement('div');p.className='pattern big';p.textContent=seq.join('  ')+'  ?';wrap.appendChild(p);const row=document.createElement('div');row.className='row';['●','■','▲'].forEach(s=>row.appendChild(makeBtn('btn secondary symbolBtn',s,()=>answer(s===correct))));wrap.appendChild(row);box.appendChild(wrap);}
}
$('hostBtn').onclick=startPeerHost;$('joinBtn').onclick=()=>show('join');$('back1').onclick=()=>show('home');$('back2').onclick=()=>show('home');$('connectBtn').onclick=connectToHost;$('startBtn').onclick=()=>{round=0;score=0;Object.values(players).forEach(p=>{p.score=0;p.answered=false});hostStartRound();};$('nextBtn').onclick=()=>{if(isHost){round++;hostStartRound();}};window.addEventListener('error',e=>alert('Fehler: '+e.message));
})();
</script>
</body>
</html>
