<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Focus Clash Brain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <section class="screen active" id="home">
      <div class="logo">FOCUS<br><span>CLASH</span></div>
      <p class="sub">Fokus • Reaktion • Wahrnehmung</p>
      <button id="hostBtn" class="big primary">SPIEL HOSTEN</button>
      <button id="joinBtn" class="big secondary">BEITRETEN</button>
      <p class="hint">GitHub Pages • WebRTC • kein Firebase</p>
    </section>

    <section class="screen" id="hostScreen">
      <div class="top"><button class="back">←</button><div>HOST</div></div>
      <div class="codeBox"><span>CODE</span><b id="roomCode">----</b></div>
      <div class="players" id="players"></div>
      <button id="startBtn" class="big primary">START</button>
      <p class="hint">Andere Tablets: gleiche URL öffnen und Code eingeben.</p>
    </section>

    <section class="screen" id="joinScreen">
      <div class="top"><button class="back">←</button><div>JOIN</div></div>
      <input id="nameInput" maxlength="12" placeholder="NAME" autocomplete="off">
      <input id="codeInput" maxlength="12" placeholder="CODE" autocomplete="off">
      <button id="connectBtn" class="big primary">VERBINDEN</button>
      <p id="joinStatus" class="hint"></p>
    </section>

    <section class="screen" id="playScreen">
      <div class="gameTop"><div id="roundName">●</div><div id="timer">10</div><div id="score">0</div></div>
      <div id="instruction" class="instruction"></div>
      <div id="gameArea" class="gameArea"></div>
    </section>

    <section class="screen" id="boardScreen">
      <div class="logo small">RANGLISTE</div>
      <div id="leaderboard" class="leaderboard"></div>
      <button id="nextBtn" class="big primary">WEITER</button>
    </section>
  </div>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
