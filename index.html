<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Focus Clash</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  background:#101014;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.app{
  width:100%;
  max-width:760px;
  padding:24px;
}
.screen{display:none}
.screen.active{display:block}
.panel{
  background:#181820;
  border-radius:28px;
  padding:34px 24px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}
.logo{
  font-size:54px;
  line-height:.92;
  font-weight:900;
  letter-spacing:2px;
  margin:0 0 14px;
}
.tagline{
  font-size:20px;
  opacity:.85;
  margin:0 0 28px;
}
.btn{
  display:block;
  width:100%;
  max-width:360px;
  margin:14px auto;
  padding:20px 22px;
  font-size:22px;
  font-weight:800;
  border:0;
  border-radius:22px;
  color:white;
  background:#2c2c38;
  cursor:pointer;
}
.btn.primary{background:#5b5cf0}
.btn.secondary{background:#2f303a}
.footer{
  margin-top:26px;
  font-size:15px;
  opacity:.55;
}
.back{
  position:absolute;
  top:18px;
  left:18px;
  font-size:28px;
  background:transparent;
  color:white;
  border:0;
}
.code{
  font-size:64px;
  font-weight:900;
  letter-spacing:8px;
  margin:20px 0;
}
input{
  width:100%;
  max-width:300px;
  padding:18px;
  font-size:28px;
  text-align:center;
  border:0;
  border-radius:18px;
  margin:16px 0;
}
.round{
  font-size:18px;
  opacity:.65;
  margin-bottom:14px;
}
.taskText{
  font-size:22px;
  margin:10px 0 18px;
}
.big{
  font-size:72px;
  font-weight:900;
  margin:22px 0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  max-width:430px;
  margin:22px auto 0;
}
.tile{
  height:130px;
  border:0;
  border-radius:26px;
  font-size:42px;
  font-weight:900;
  color:white;
  background:#333;
}
.answerBtn{
  min-width:140px;
  padding:24px;
  font-size:28px;
  border:0;
  border-radius:22px;
  margin:12px;
  font-weight:900;
}
.wait{
  font-size:30px;
  line-height:1.35;
  color:#9CFFA8;
  margin:28px 0;
}
.small{
  opacity:.7;
  font-size:18px;
}
</style>
</head>
<body>
<div class="app">

<section id="home" class="screen active">
  <div class="panel">
    <h1 class="logo">FOCUS<br>CLASH</h1>
    <p class="tagline">Fokus • Reaktion • Wahrnehmung</p>
    <button class="btn primary" onclick="host()">SPIEL HOSTEN</button>
    <button class="btn secondary" onclick="join()">BEITRETEN</button>
    <div class="footer">GitHub Pages • WebRTC • kein Firebase</div>
  </div>
</section>

<section id="host" class="screen">
  <button class="back" onclick="show('home')">←</button>
  <div class="panel">
    <h2>HOST</h2>
    <div id="roomCode" class="code">----</div>
    <button class="btn primary" onclick="startGame()">START</button>
    <p class="small">Andere Tablets: gleiche URL öffnen und Code eingeben.</p>
  </div>
</section>

<section id="join" class="screen">
  <button class="back" onclick="show('home')">←</button>
  <div class="panel">
    <h2>JOIN</h2>
    <input id="joinCode" placeholder="CODE" maxlength="4">
    <button class="btn primary" onclick="waitRoom()">VERBINDEN</button>
  </div>
</section>

<section id="waitRoom" class="screen">
  <button class="back" onclick="show('home')">←</button>
  <div class="panel">
    <div class="wait">Verbunden<br>Warte auf Host…</div>
  </div>
</section>

<section id="game" class="screen">
  <div class="panel">
    <div id="round" class="round"></div>
    <div id="task"></div>
    <div id="answers"></div>
  </div>
</section>

<section id="wait" class="screen">
  <div class="panel">
    <div class="wait">Antwort gespeichert<br>Warte auf nächste Aufgabe…</div>
  </div>
</section>

<section id="end" class="screen">
  <div class="panel">
    <h1 class="logo">FERTIG</h1>
    <h2 id="score"></h2>
    <button class="btn primary" onclick="location.reload()">NOCHMAL</button>
  </div>
</section>

</div>

<script>
let current=0;
let points=0;
const total=20;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function rnd(a){ return a[Math.floor(Math.random()*a.length)] }

function host(){
  document.getElementById("roomCode").innerText=Math.floor(1000+Math.random()*9000);
  show("host");
}
function join(){ show("join") }
function waitRoom(){ show("waitRoom"); setTimeout(startGame,1400) }

function startGame(){
  current=0;
  points=0;
  nextTask();
}
function finish(ok){
  if(ok) points++;
  show("wait");
  setTimeout(nextTask,900);
}
function nextTask(){
  if(current>=total){
    show("end");
    document.getElementById("score").innerText="Punkte: "+points+" / "+total;
    return;
  }
  current++;
  show("game");
  document.getElementById("round").innerText="●   "+(total-current+1)+"   "+points;
  const type=Math.floor(Math.random()*5);
  if(type===0) colorGame();
  if(type===1) oddGame();
  if(type===2) memoryGame();
  if(type===3) reactionGame();
  if(type===4) positionGame();
}

function colorGame(){
  const words=["ROT","BLAU","GRÜN","GELB"];
  const colors=["red","blue","green","yellow"];
  const labels={red:"ROT",blue:"BLAU",green:"GRÜN",yellow:"GELB"};
  const word=rnd(words);
  const color=rnd(colors);
  const mode=Math.floor(Math.random()*4);
  const task=document.getElementById("task");
  const area=document.getElementById("answers");
  area.innerHTML="";
  area.className="";

  if(mode===0){
    task.innerHTML='<div class="taskText">SCHRIFTFARBE</div><div class="big" style="color:'+color+'">'+word+'</div>';
    colorButtons(c=>c===color);
  }
  if(mode===1){
    task.innerHTML='<div class="taskText">WORT</div><div class="big" style="color:'+color+'">'+word+'</div>';
    const wanted=word==="ROT"?"red":word==="BLAU"?"blue":word==="GRÜN"?"green":"yellow";
    colorButtons(c=>c===wanted);
  }
  if(mode===2){
    task.innerHTML='<div class="taskText">PASST ES?</div><div class="big" style="color:'+color+'">'+word+'</div>';
    const ok=(word==="ROT"&&color==="red")||(word==="BLAU"&&color==="blue")||(word==="GRÜN"&&color==="green")||(word==="GELB"&&color==="yellow");
    ["JA","NEIN"].forEach(v=>{
      const b=document.createElement("button");
      b.className="answerBtn";
      b.innerText=v;
      b.onclick=()=>finish((v==="JA")===ok);
      area.appendChild(b);
    });
  }
  if(mode===3){
    const target=rnd(colors);
    task.innerHTML='<div class="taskText">NUR '+labels[target]+'</div>';
    colorButtons(c=>c===target);
  }

  function colorButtons(check){
    area.className="grid";
    colors.forEach(c=>{
      const b=document.createElement("button");
      b.className="tile";
      b.style.background=c;
      b.onclick=()=>finish(check(c));
      area.appendChild(b);
    });
  }
}

function oddGame(){
  const mode=Math.floor(Math.random()*4);
  const area=document.getElementById("answers");
  const task=document.getElementById("task");
  area.className="grid";
  area.innerHTML="";
  const odd=Math.floor(Math.random()*4);

  if(mode===0) task.innerHTML='<div class="taskText">ANDERES FELD</div>';
  if(mode===1) task.innerHTML='<div class="taskText">ANDERE FORM</div>';
  if(mode===2) task.innerHTML='<div class="taskText">ANDERES SYMBOL</div>';
  if(mode===3) task.innerHTML='<div class="taskText">ANDERE FARBE</div>';

  for(let i=0;i<4;i++){
    const b=document.createElement("button");
    b.className="tile";
    if(mode===0){ b.style.background=i===odd?"#777":"#444"; }
    if(mode===1){ b.style.background="#444"; b.style.borderRadius=i===odd?"45px":"16px"; }
    if(mode===2){ b.style.background="#444"; b.innerText=i===odd?"◆":"●"; }
    if(mode===3){ b.style.background=i===odd?"#5566cc":"#555577"; }
    b.onclick=()=>finish(i===odd);
    area.appendChild(b);
  }
}

function memoryGame(){
  const mode=Math.floor(Math.random()*4);
  const task=document.getElementById("task");
  const area=document.getElementById("answers");
  area.className="";
  area.innerHTML="";

  if(mode===0){
    const num=Math.floor(1000+Math.random()*9000);
    task.innerHTML='<div class="taskText">MERKEN</div>';
    area.innerHTML='<div class="big">'+num+'</div>';
    setTimeout(()=>choose([num,randNum(),randNum(),randNum()],num,"WELCHE ZAHL?"),1000);
  }
  if(mode===1){
    const opts=["●","▲","■","◆"];
    const target=rnd(opts);
    task.innerHTML='<div class="taskText">MERKEN</div>';
    area.innerHTML='<div class="big">'+target+'</div>';
    setTimeout(()=>choose(opts,target,"WELCHES SYMBOL?"),1000);
  }
  if(mode===2){
    const colors=["red","blue","green","yellow"];
    const target=rnd(colors);
    task.innerHTML='<div class="taskText">MERKEN</div>';
    area.innerHTML='<div style="width:180px;height:180px;border-radius:28px;background:'+target+';margin:auto"></div>';
    setTimeout(()=>{
      task.innerHTML='<div class="taskText">WELCHE FARBE?</div>';
      area.className="grid"; area.innerHTML="";
      colors.forEach(c=>{
        const b=document.createElement("button");
        b.className="tile"; b.style.background=c;
        b.onclick=()=>finish(c===target);
        area.appendChild(b);
      });
    },1000);
  }
  if(mode===3){
    const pos=Math.floor(Math.random()*4);
    task.innerHTML='<div class="taskText">POSITION MERKEN</div>';
    area.className="grid";
    for(let i=0;i<4;i++){
      const b=document.createElement("button"); b.className="tile";
      b.style.background=i===pos?"white":"#333"; area.appendChild(b);
    }
    setTimeout(()=>positionChoice(pos),850);
  }

  function randNum(){ return Math.floor(1000+Math.random()*9000) }
  function choose(options,correct,title){
    task.innerHTML='<div class="taskText">'+title+'</div>';
    const unique=[...new Set(options)];
    while(unique.length<4){ const n=randNum(); if(!unique.includes(n)) unique.push(n); }
    unique.sort(()=>Math.random()-0.5);
    area.className="";
    area.innerHTML="";
    unique.forEach(o=>{
      const b=document.createElement("button");
      b.className="answerBtn";
      b.innerText=o;
      b.onclick=()=>finish(o===correct);
      area.appendChild(b);
    });
  }
}

function reactionGame(){
  const mode=Math.floor(Math.random()*4);
  const task=document.getElementById("task");
  const area=document.getElementById("answers");
  area.className="";
  if(mode===0) task.innerHTML='<div class="taskText">TIPPE BEI GRÜN</div>';
  if(mode===1) task.innerHTML='<div class="taskText">NICHT BEI ROT</div>';
  if(mode===2) task.innerHTML='<div class="taskText">TIPPE BEI BLAU</div>';
  if(mode===3) task.innerHTML='<div class="taskText">TIPPE BEI ●</div>';
  area.innerHTML='<button id="reactBox" class="tile" style="width:100%;max-width:420px;background:#555"></button>';
  const box=document.getElementById("reactBox");
  setTimeout(()=>{
    if(mode<3){
      const chosen=rnd(["lime","red","blue"]);
      box.style.background=chosen;
      box.onclick=()=>finish(mode===0?chosen==="lime":mode===1?chosen!=="red":chosen==="blue");
    }else{
      const sym=rnd(["●","▲"]);
      box.innerText=sym;
      box.onclick=()=>finish(sym==="●");
    }
  },900+Math.random()*1000);
}

function positionGame(){
  const mode=Math.floor(Math.random()*3);
  const task=document.getElementById("task");
  const area=document.getElementById("answers");
  const pos=Math.floor(Math.random()*4);
  area.className="grid";
  area.innerHTML="";
  task.innerHTML=mode===0?'<div class="taskText">HELLE POSITION</div>':mode===1?'<div class="taskText">SYMBOL POSITION</div>':'<div class="taskText">FARBE POSITION</div>';
  for(let i=0;i<4;i++){
    const b=document.createElement("button"); b.className="tile";
    b.style.background="#333";
    if(i===pos){
      if(mode===0) b.style.background="white";
      if(mode===1) b.innerText="◆";
      if(mode===2) b.style.background="yellow";
    }
    area.appendChild(b);
  }
  setTimeout(()=>positionChoice(pos),850);
}

function positionChoice(pos){
  const task=document.getElementById("task");
  const area=document.getElementById("answers");
  task.innerHTML='<div class="taskText">WO WAR ES?</div>';
  area.className="grid";
  area.innerHTML="";
  for(let i=0;i<4;i++){
    const b=document.createElement("button");
    b.className="tile";
    b.style.background="#444";
    b.onclick=()=>finish(i===pos);
    area.appendChild(b);
  }
}
</script>
</body>
</html>
