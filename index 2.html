<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Focus Clash</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:#101014;color:white;display:flex;justify-content:center;align-items:center;text-align:center}.app{width:100%;max-width:760px;padding:24px}.screen{display:none}.screen.active{display:block}.panel{background:#181820;border-radius:28px;padding:34px 24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}.logo{font-size:54px;line-height:.92;font-weight:900;letter-spacing:2px;margin:0 0 14px}.tagline{font-size:20px;opacity:.85;margin:0 0 26px}.btn{display:block;width:100%;max-width:360px;margin:14px auto;padding:20px 22px;font-size:22px;font-weight:800;border:0;border-radius:22px;color:white;background:#2c2c38;cursor:pointer}.btn.primary{background:#5b5cf0}.btn.secondary{background:#2f303a}.footer{margin-top:26px;font-size:15px;opacity:.55}.back{position:absolute;top:18px;left:18px;font-size:28px;background:transparent;color:white;border:0}.code{font-size:64px;font-weight:900;letter-spacing:8px;margin:14px 0 20px}input{width:100%;max-width:330px;padding:18px;font-size:24px;text-align:center;border:0;border-radius:18px;margin:10px 0;background:#fff;color:#111}.round{font-size:18px;opacity:.65;margin-bottom:16px}.taskText{font-size:24px;margin:8px 0 20px;font-weight:800;letter-spacing:.5px}.big{font-size:72px;font-weight:900;margin:22px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:430px;margin:22px auto 0}.tile{height:130px;border:0;border-radius:26px;font-size:42px;font-weight:900;color:white;background:#333}.answerBtn{min-width:140px;padding:24px;font-size:28px;border:0;border-radius:22px;margin:12px;font-weight:900}.wait{font-size:30px;line-height:1.35;color:#9CFFA8;margin:28px 0}.smallText{opacity:.72;font-size:17px;line-height:1.4}.list{margin:18px auto;max-width:430px;text-align:left}.row{display:flex;justify-content:space-between;border-bottom:1px solid #2a2a36;padding:10px 0;font-size:18px}.err{color:#ff8585;margin-top:10px}
</style>
</head>
<body><div class="app">
<section id="home" class="screen active"><div class="panel"><h1 class="logo">FOCUS<br>CLASH</h1><p class="tagline">Fokus • Reaktion • Wahrnehmung</p><button class="btn primary" onclick="goHostSetup()">SPIEL HOSTEN</button><button class="btn secondary" onclick="goJoinSetup()">BEITRETEN</button><div class="footer">GitHub Pages • WebRTC • kein Firebase</div></div></section>
<section id="hostSetup" class="screen"><button class="back" onclick="show('home')">←</button><div class="panel"><h2>HOST</h2><input id="hostName" placeholder="Dein Name" value="Host"><button class="btn primary" onclick="createRoom()">RAUM ERSTELLEN</button><div id="hostSetupMsg" class="smallText"></div></div></section>
<section id="hostRoom" class="screen"><button class="back" onclick="location.reload()">←</button><div class="panel"><h2>HOST</h2><div id="roomCode" class="code">----</div><p class="smallText">Andere Tablets: gleiche URL öffnen, Namen eingeben und Code nutzen.</p><div id="playerList" class="list"></div><button class="btn primary" onclick="startGame()">START</button></div></section>
<section id="joinSetup" class="screen"><button class="back" onclick="show('home')">←</button><div class="panel"><h2>JOIN</h2><input id="playerName" placeholder="Dein Name"><input id="joinCode" placeholder="CODE" maxlength="4"><button class="btn primary" onclick="connectToRoom()">VERBINDEN</button><div id="joinMsg" class="smallText"></div></div></section>
<section id="playerLobby" class="screen"><button class="back" onclick="location.reload()">←</button><div class="panel"><div class="wait">Verbunden<br>Warte auf Host…</div><div id="myName" class="smallText"></div></div></section>
<section id="hostControl" class="screen"><div class="panel"><div id="hostRound" class="round"></div><h2>HOST-STEUERUNG</h2><div id="answerCount" class="smallText"></div><div id="scoreboard" class="list"></div><button class="btn primary" onclick="hostNext()">WEITER</button></div></section>
<section id="game" class="screen"><div class="panel"><div id="round" class="round"></div><div id="task"></div><div id="answers"></div></div></section>
<section id="waitAnswer" class="screen"><div class="panel"><div class="wait">Antwort gespeichert<br>Warte auf Host…</div></div></section>
<section id="end" class="screen"><div class="panel"><h1 class="logo">FERTIG</h1><div id="finalScores" class="list"></div><button class="btn primary" onclick="location.reload()">NOCHMAL</button></div></section>
</div><script>
const TOTAL=20;let peer=null,conn=null,conns=[],players={},scores={},answered={},round=0,locked=false,reactionTimer=null,reactionAutoTimer=null;
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function rnd(a){return a[Math.floor(Math.random()*a.length)]}function shuffle(a){return a.sort(()=>Math.random()-.5)}function safe(v,f){v=(v||'').trim();return v||f}
function goHostSetup(){show('hostSetup')}function goJoinSetup(){show('joinSetup')}
function createRoom(){const name=safe(document.getElementById('hostName').value,'Host');const code=String(Math.floor(1000+Math.random()*9000));document.getElementById('hostSetupMsg').innerText='Raum wird erstellt…';peer=new Peer('focus-clash-'+code);peer.on('open',()=>{players={host:{name:name}};scores={host:0};document.getElementById('roomCode').innerText=code;updatePlayerList();show('hostRoom')});peer.on('connection',c=>{c.on('data',m=>handleHostData(c,m))});peer.on('error',()=>{document.getElementById('hostSetupMsg').innerHTML='<div class="err">Fehler. Neu laden und erneut versuchen.</div>'})}
function handleHostData(c,m){if(!m||!m.type)return;if(m.type==='join'){players[c.peer]={name:safe(m.name,'Spieler')};scores[c.peer]=scores[c.peer]||0;if(!conns.includes(c))conns.push(c);c.send({type:'joined',name:players[c.peer].name});updatePlayerList()}if(m.type==='answer'){if(answered[c.peer])return;answered[c.peer]=true;if(m.correct)scores[c.peer]=(scores[c.peer]||0)+1;updateHostControl()}}
function updatePlayerList(){document.getElementById('playerList').innerHTML=Object.keys(players).map(id=>'<div class="row"><span>'+players[id].name+'</span><span>'+(id==='host'?'Host':'bereit')+'</span></div>').join('')}
function broadcast(d){conns.forEach(c=>{try{c.send(d)}catch(e){}})}
function connectToRoom(){const name=safe(document.getElementById('playerName').value,'Spieler');const code=(document.getElementById('joinCode').value||'').trim();if(code.length<4){document.getElementById('joinMsg').innerHTML='<div class="err">Bitte Code eingeben.</div>';return}document.getElementById('joinMsg').innerText='Verbinde…';peer=new Peer();peer.on('open',()=>{conn=peer.connect('focus-clash-'+code,{reliable:true});conn.on('open',()=>conn.send({type:'join',name:name}));conn.on('data',handlePlayerData);conn.on('error',()=>document.getElementById('joinMsg').innerHTML='<div class="err">Verbindung fehlgeschlagen.</div>')});peer.on('error',()=>document.getElementById('joinMsg').innerHTML='<div class="err">PeerJS nicht erreichbar.</div>')}
function handlePlayerData(m){if(!m||!m.type)return;if(m.type==='joined'){document.getElementById('myName').innerText=m.name;show('playerLobby')}if(m.type==='task'){clearReactionTimers();locked=false;document.getElementById('round').innerText='●   '+(TOTAL-m.round+1)+'   '+(m.score||0);renderTask(m.task);show('game')}if(m.type==='end'){renderFinal(m.scores);show('end')}}
function startGame(){round=0;Object.keys(scores).forEach(k=>scores[k]=0);hostNext()}
function hostNext(){if(round>=TOTAL){const f=getScoreArray();broadcast({type:'end',scores:f});renderFinal(f);show('end');return}round++;answered={};const task=makeTask();broadcast({type:'task',round:round,task:task,score:0});show('hostControl');updateHostControl()}
function updateHostControl(){document.getElementById('hostRound').innerText='Runde '+round+' / '+TOTAL;document.getElementById('answerCount').innerText=Object.keys(answered).length+' / '+conns.length+' Antworten';document.getElementById('scoreboard').innerHTML=getScoreArray().map((p,i)=>'<div class="row"><span>'+(i+1)+'. '+p.name+'</span><span>'+p.score+'</span></div>').join('')}
function getScoreArray(){return Object.keys(players).filter(id=>id!=='host').map(id=>({name:players[id].name,score:scores[id]||0})).sort((a,b)=>b.score-a.score)}
function renderFinal(a){document.getElementById('finalScores').innerHTML=(a&&a.length?a:[{name:'Keine Spieler',score:0}]).map((p,i)=>'<div class="row"><span>'+(i+1)+'. '+p.name+'</span><span>'+p.score+'</span></div>').join('')}
function answer(ok){if(locked)return;locked=true;clearReactionTimers();if(conn)conn.send({type:'answer',correct:!!ok});show('waitAnswer')}
function makeTask(){const t=rnd(['color','odd','memory','reaction','position']);return t==='color'?makeColorTask():t==='odd'?makeOddTask():t==='memory'?makeMemoryTask():t==='reaction'?makeReactionTask():makePositionTask()}
function makeColorTask(){const words=['ROT','BLAU','GRÜN','GELB'],colors=['red','blue','green','yellow'];return{type:'color',mode:rnd(['ink','word','match','target']),word:rnd(words),color:rnd(colors),target:rnd(colors)}}
function makeOddTask(){return{type:'odd',mode:rnd(['shade','shape','symbol','color']),odd:Math.floor(Math.random()*4)}}
function makeMemoryTask(){const mode=rnd(['number','symbol','color','position']);if(mode==='number')return{type:'memory',mode,value:String(Math.floor(1000+Math.random()*9000))};if(mode==='symbol')return{type:'memory',mode,value:rnd(['●','▲','■','◆'])};if(mode==='color')return{type:'memory',mode,value:rnd(['red','blue','green','yellow'])};return{type:'memory',mode,value:Math.floor(Math.random()*4)}}
function makeReactionTask(){const mode=rnd(['green','notRed','blue','circle']);let s;if(mode==='green')s=rnd(['lime','lime','red']);if(mode==='notRed')s=rnd(['lime','blue','red']);if(mode==='blue')s=rnd(['blue','blue','red']);if(mode==='circle')s=rnd(['●','●','▲']);return{type:'reaction',mode,stimulus:s,delay:800+Math.floor(Math.random()*900)}}
function makePositionTask(){return{type:'position',mode:rnd(['light','symbol','color']),pos:Math.floor(Math.random()*4)}}
function renderTask(t){if(t.type==='color')renderColor(t);if(t.type==='odd')renderOdd(t);if(t.type==='memory')renderMemory(t);if(t.type==='reaction')renderReaction(t);if(t.type==='position')renderPosition(t)}
function renderColor(t){const task=document.getElementById('task'),area=document.getElementById('answers'),colors=['red','blue','green','yellow'],lab={red:'ROT',blue:'BLAU',green:'GRÜN',yellow:'GELB'};area.innerHTML='';area.className='grid';if(t.mode==='ink')task.innerHTML='<div class="taskText">SCHRIFTFARBE</div><div class="big" style="color:'+t.color+'">'+t.word+'</div>';if(t.mode==='word')task.innerHTML='<div class="taskText">WORT</div><div class="big" style="color:'+t.color+'">'+t.word+'</div>';if(t.mode==='target')task.innerHTML='<div class="taskText">NUR '+lab[t.target]+'</div>';if(t.mode==='match'){area.className='';task.innerHTML='<div class="taskText">PASST ES?</div><div class="big" style="color:'+t.color+'">'+t.word+'</div>';const ok=(t.word==='ROT'&&t.color==='red')||(t.word==='BLAU'&&t.color==='blue')||(t.word==='GRÜN'&&t.color==='green')||(t.word==='GELB'&&t.color==='yellow');['JA','NEIN'].forEach(v=>{const b=document.createElement('button');b.className='answerBtn';b.innerText=v;b.onclick=()=>answer((v==='JA')===ok);area.appendChild(b)});return}colors.forEach(c=>{const b=document.createElement('button');b.className='tile';b.style.background=c;b.onclick=()=>{if(t.mode==='ink')answer(c===t.color);if(t.mode==='word'){const w=t.word==='ROT'?'red':t.word==='BLAU'?'blue':t.word==='GRÜN'?'green':'yellow';answer(c===w)}if(t.mode==='target')answer(c===t.target)};area.appendChild(b)})}
function renderOdd(t){const task=document.getElementById('task'),area=document.getElementById('answers');area.className='grid';area.innerHTML='';task.innerHTML='<div class="taskText">'+(t.mode==='shade'?'ANDERES FELD':t.mode==='shape'?'ANDERE FORM':t.mode==='symbol'?'ANDERES SYMBOL':'ANDERE FARBE')+'</div>';for(let i=0;i<4;i++){const b=document.createElement('button');b.className='tile';if(t.mode==='shade')b.style.background=i===t.odd?'#777':'#444';if(t.mode==='shape'){b.style.background='#444';b.style.borderRadius=i===t.odd?'45px':'16px'}if(t.mode==='symbol'){b.style.background='#444';b.innerText=i===t.odd?'◆':'●'}if(t.mode==='color')b.style.background=i===t.odd?'#5566cc':'#555577';b.onclick=()=>answer(i===t.odd);area.appendChild(b)}}
function renderMemory(t){const task=document.getElementById('task'),area=document.getElementById('answers');area.className='';area.innerHTML='';task.innerHTML='<div class="taskText">MERKEN</div>';if(t.mode==='number'){area.innerHTML='<div class="big">'+t.value+'</div>';setTimeout(()=>memoryOptions(t.value,[t.value,randNum(),randNum(),randNum()],'WELCHE ZAHL?'),1000)}if(t.mode==='symbol'){area.innerHTML='<div class="big">'+t.value+'</div>';setTimeout(()=>memoryOptions(t.value,['●','▲','■','◆'],'WELCHES SYMBOL?'),1000)}if(t.mode==='color'){area.innerHTML='<div style="width:180px;height:180px;border-radius:28px;background:'+t.value+';margin:auto"></div>';setTimeout(()=>{task.innerHTML='<div class="taskText">WELCHE FARBE?</div>';area.className='grid';area.innerHTML='';['red','blue','green','yellow'].forEach(c=>{const b=document.createElement('button');b.className='tile';b.style.background=c;b.onclick=()=>answer(c===t.value);area.appendChild(b)})},1000)}if(t.mode==='position'){area.className='grid';for(let i=0;i<4;i++){const b=document.createElement('button');b.className='tile';b.style.background=i===t.value?'white':'#333';area.appendChild(b)}setTimeout(()=>renderPositionChoice(t.value),850)}}
function randNum(){return String(Math.floor(1000+Math.random()*9000))}function memoryOptions(correct,opts,title){const task=document.getElementById('task'),area=document.getElementById('answers'),options=[...new Set(opts)];while(options.length<4){const n=randNum();if(!options.includes(n))options.push(n)}shuffle(options);task.innerHTML='<div class="taskText">'+title+'</div>';area.className='';area.innerHTML='';options.forEach(o=>{const b=document.createElement('button');b.className='answerBtn';b.innerText=o;b.onclick=()=>answer(o===correct);area.appendChild(b)})}
function renderReaction(t){clearReactionTimers();const task=document.getElementById('task'),area=document.getElementById('answers');area.className='';area.innerHTML='<button id="reactBox" class="tile" style="width:100%;max-width:430px;background:#555"></button>';if(t.mode==='green')task.innerHTML='<div class="taskText">TIPPE BEI GRÜN</div>';if(t.mode==='notRed')task.innerHTML='<div class="taskText">NICHT BEI ROT</div>';if(t.mode==='blue')task.innerHTML='<div class="taskText">TIPPE BEI BLAU</div>';if(t.mode==='circle')task.innerHTML='<div class="taskText">TIPPE BEI ●</div>';const box=document.getElementById('reactBox');reactionTimer=setTimeout(()=>{let ok=false;if(t.mode==='green'){box.style.background=t.stimulus;ok=t.stimulus==='lime'}if(t.mode==='notRed'){box.style.background=t.stimulus;ok=t.stimulus!=='red'}if(t.mode==='blue'){box.style.background=t.stimulus;ok=t.stimulus==='blue'}if(t.mode==='circle'){box.innerText=t.stimulus;ok=t.stimulus==='●'}box.onclick=()=>answer(ok);reactionAutoTimer=setTimeout(()=>{if(locked)return;if((t.mode==='notRed'&&t.stimulus==='red')||(t.mode==='green'&&t.stimulus!=='lime')||(t.mode==='blue'&&t.stimulus!=='blue')||(t.mode==='circle'&&t.stimulus!=='●'))answer(true);else answer(false)},1300)},t.delay)}
function clearReactionTimers(){if(reactionTimer)clearTimeout(reactionTimer);if(reactionAutoTimer)clearTimeout(reactionAutoTimer);reactionTimer=null;reactionAutoTimer=null}
function renderPosition(t){const task=document.getElementById('task'),area=document.getElementById('answers');area.className='grid';area.innerHTML='';task.innerHTML='<div class="taskText">'+(t.mode==='light'?'HELLE POSITION':t.mode==='symbol'?'SYMBOL POSITION':'FARBE POSITION')+'</div>';for(let i=0;i<4;i++){const b=document.createElement('button');b.className='tile';b.style.background='#333';if(i===t.pos){if(t.mode==='light')b.style.background='white';if(t.mode==='symbol')b.innerText='◆';if(t.mode==='color')b.style.background='yellow'}area.appendChild(b)}setTimeout(()=>renderPositionChoice(t.pos),850)}
function renderPositionChoice(pos){const task=document.getElementById('task'),area=document.getElementById('answers');task.innerHTML='<div class="taskText">WO WAR ES?</div>';area.className='grid';area.innerHTML='';for(let i=0;i<4;i++){const b=document.createElement('button');b.className='tile';b.style.background='#444';b.onclick=()=>answer(i===pos);area.appendChild(b)}}
</script></body></html>
